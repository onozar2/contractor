<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Instant planning estimate for your remodel - Joon Development Group, Los Angeles." />
  <title>Instant Estimate | Joon Development Group</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink:#172033; --muted:#687587; --line:#d8dee8; --soft:#f5f7fa; --blue:#2563eb; --green:#0f766e; --charcoal:#101828; }
    body { color: var(--ink); background: #eef2f6; font-family: Inter, ui-sans-serif, system-ui, "Segoe UI", sans-serif; line-height: 1.5; }
    .top { background: var(--charcoal); color: #fff; padding: 0.7rem 4vw; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .top b { letter-spacing: 0.06em; text-transform: uppercase; }
    .top a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.85rem; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 1.5rem 4vw 4rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.3rem; }
    .sub { color: var(--muted); margin-bottom: 1.2rem; }
    .progress { display: flex; gap: 0.35rem; margin-bottom: 1.2rem; }
    .progress i { flex: 1; height: 6px; border-radius: 3px; background: var(--line); }
    .progress i.on { background: var(--blue); }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 1.3rem; box-shadow: 0 14px 36px rgba(16,24,40,0.08); }
    .card h2 { font-size: 1.1rem; margin-bottom: 0.9rem; }
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .choice { border: 2px solid var(--line); border-radius: 10px; padding: 0.8rem; cursor: pointer; font-weight: 700; font-size: 0.92rem; transition: border-color 0.12s; }
    .choice:hover { border-color: var(--blue); }
    .choice.on { border-color: var(--blue); background: #eff4ff; }
    .choice small { display: block; color: var(--muted); font-weight: 500; font-size: 0.76rem; }
    label.f { display: grid; gap: 0.2rem; font-size: 0.74rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 0.7rem; }
    input, select, textarea { min-height: 42px; border: 1px solid var(--line); border-radius: 8px; padding: 0.5rem 0.7rem; font: inherit; background: var(--soft); width: 100%; }
    textarea { min-height: 70px; resize: vertical; }
    .nav { display: flex; justify-content: space-between; margin-top: 1.1rem; }
    .btn { min-height: 44px; border: 0; border-radius: 9px; padding: 0 1.3rem; font: inherit; font-weight: 800; cursor: pointer; background: var(--soft); color: var(--ink); }
    .btn.primary { background: var(--blue); color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .result-range { font-size: 2rem; font-weight: 900; color: var(--blue); }
    .result-typical { color: var(--muted); margin-bottom: 1rem; }
    .driver { display: flex; justify-content: space-between; font-size: 0.88rem; padding: 0.45rem 0; border-bottom: 1px solid var(--soft); }
    .fine { color: var(--muted); font-size: 0.76rem; margin-top: 1rem; }
    .err { color: #b42318; font-size: 0.85rem; margin-top: 0.6rem; }
    @media (max-width: 560px) { .choices { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="top"><b>Joon Development Group</b><a href="tel:+18183710334">(818) 371-0334</a></div>
  <div class="wrap">
    <h1>What will your project cost?</h1>
    <p class="sub">Answer a few questions and get a real planning range for the Los Angeles market - in about 60 seconds.</p>
    <div class="progress" id="progress"></div>
    <div class="card" id="stage"></div>
  </div>
  <script>
    let config = null;
    let step = 0;
    const state = { projectType: "", size: "", options: [], finish: "mid", timeline: "", budgetMax: "", ownerStatus: "", name: "", email: "", phone: "", zip: "", notes: "" };
    const $ = (s) => document.querySelector(s);
    const esc = (v) => String(v ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const money = (n) => "$" + Math.round(n).toLocaleString();
    const STEPS = 5;

    function progress() {
      $("#progress").innerHTML = Array.from({ length: STEPS }, (_, i) => `<i class="${i <= step ? "on" : ""}"></i>`).join("");
    }
    function ptype() { return config.projectTypes.find((p) => p.key === state.projectType); }

    function render() {
      progress();
      const el = $("#stage");
      if (step === 0) {
        el.innerHTML = `<h2>What are you planning?</h2><div class="choices">` +
          config.projectTypes.map((p) => `<div class="choice ${state.projectType === p.key ? "on" : ""}" data-pt="${p.key}">${esc(p.label)}<small>typically ${esc(p.typicalDuration)}</small></div>`).join("") +
          `</div><div class="nav"><span></span><button class="btn primary" id="next" ${state.projectType ? "" : "disabled"}>Next</button></div>`;
      } else if (step === 1) {
        const p = ptype();
        el.innerHTML = `<h2>Size & scope</h2>
          <div class="choices" style="margin-bottom:1rem">` +
          p.sizes.map((s) => `<div class="choice ${state.size === s.key ? "on" : ""}" data-size="${s.key}">${esc(s.label)}</div>`).join("") + `</div>
          ${p.options.length ? `<h2 style="font-size:0.95rem">Add-ons (check any that apply)</h2><div class="choices">` +
          p.options.map((o) => `<div class="choice ${state.options.includes(o.key) ? "on" : ""}" data-opt="${o.key}">${esc(o.label)}</div>`).join("") + `</div>` : ""}
          <div class="nav"><button class="btn" id="back">Back</button><button class="btn primary" id="next" ${state.size ? "" : "disabled"}>Next</button></div>`;
      } else if (step === 2) {
        el.innerHTML = `<h2>A few details</h2>
          <label class="f">Finish level<select id="fFinish">${config.finishLevels.map((f) => `<option value="${f.key}" ${state.finish === f.key ? "selected" : ""}>${esc(f.label)}</option>`).join("")}</select></label>
          <label class="f">When do you want to start?<select id="fTimeline"><option value="">- choose -</option>${config.timelines.map((t) => `<option value="${t.key}" ${state.timeline === t.key ? "selected" : ""}>${esc(t.label)}</option>`).join("")}</select></label>
          <label class="f">Rough budget ceiling (optional)<input id="fBudget" type="number" placeholder="e.g. 30000" value="${esc(state.budgetMax)}" /></label>
          <label class="f">You are the...<select id="fOwner"><option value="">- choose -</option><option value="owner" ${state.ownerStatus === "owner" ? "selected" : ""}>Homeowner</option><option value="buying" ${state.ownerStatus === "buying" ? "selected" : ""}>Buying the home</option><option value="renter" ${state.ownerStatus === "renter" ? "selected" : ""}>Renter</option></select></label>
          <div class="nav"><button class="btn" id="back">Back</button><button class="btn primary" id="next">Next</button></div>`;
      } else if (step === 3) {
        el.innerHTML = `<h2>Where should we send your estimate?</h2>
          <label class="f">Name<input id="cName" value="${esc(state.name)}" autocomplete="name" /></label>
          <label class="f">Email<input id="cEmail" type="email" value="${esc(state.email)}" autocomplete="email" /></label>
          <label class="f">Phone<input id="cPhone" type="tel" value="${esc(state.phone)}" autocomplete="tel" /></label>
          <label class="f">ZIP code<input id="cZip" value="${esc(state.zip)}" autocomplete="postal-code" maxlength="10" /></label>
          <label class="f">Anything else about the project? (optional)<textarea id="cNotes">${esc(state.notes)}</textarea></label>
          <div class="nav"><button class="btn" id="back">Back</button><button class="btn primary" id="submit">See my estimate</button></div>
          <div class="err" id="err"></div>
          <p class="fine">No spam - we use this to prepare your estimate and follow up once. Planning ranges are not a bid; final pricing follows a free on-site walkthrough.</p>`;
      }
    }

    function showResult(r) {
      step = 4; progress();
      $("#stage").innerHTML = `
        <h2>${esc(r.label)} - your planning range</h2>
        <div class="result-range">${money(r.low)} - ${money(r.high)}</div>
        <div class="result-typical">Most projects like yours land around <b>${money(r.typical)}</b> · typical duration ${esc(r.duration)}</div>
        <h2 style="font-size:0.95rem">What drives the cost</h2>
        ${r.drivers.map((d) => `<div class="driver"><span>${esc(d)}</span><span style="color:var(--muted)">major factor</span></div>`).join("")}
        <p class="fine" style="margin-top:1.2rem"><b>What happens next:</b> we'll reach out within one business day to schedule a free walkthrough and turn this range into a firm proposal. Or call us now: <a href="tel:+18183710334">(818) 371-0334</a>.</p>`;
    }

    document.addEventListener("click", async (e) => {
      const pt = e.target.closest("[data-pt]"); if (pt) { state.projectType = pt.dataset.pt; state.size = ""; state.options = []; render(); return; }
      const sz = e.target.closest("[data-size]"); if (sz) { state.size = sz.dataset.size; render(); return; }
      const opt = e.target.closest("[data-opt]"); if (opt) { const k = opt.dataset.opt; state.options = state.options.includes(k) ? state.options.filter((x) => x !== k) : [...state.options, k]; render(); return; }
      if (e.target.id === "next") { capture(); step++; render(); }
      if (e.target.id === "back") { capture(); step--; render(); }
      if (e.target.id === "submit") {
        capture();
        if (!state.name || (!state.email && !state.phone)) { $("#err").textContent = "Please add your name plus an email or phone."; return; }
        e.target.disabled = true; e.target.textContent = "Calculating...";
        try {
          const res = await fetch("/api/estimate-lead", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(state) });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          showResult(data);
        } catch (error) {
          $("#err").textContent = error.message;
          e.target.disabled = false; e.target.textContent = "See my estimate";
        }
      }
    });
    function capture() {
      const map = { fFinish: "finish", fTimeline: "timeline", fBudget: "budgetMax", fOwner: "ownerStatus", cName: "name", cEmail: "email", cPhone: "phone", cZip: "zip", cNotes: "notes" };
      for (const [id, key] of Object.entries(map)) { const el = document.getElementById(id); if (el) state[key] = el.value; }
    }

    fetch("/api/estimate-config").then((r) => r.json()).then((c) => { config = c; render(); });
  </script>
</body>
</html>
