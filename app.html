<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="JOON Command — unified backend for subs, projects, and pipeline." />
  <meta name="theme-color" content="#101828" />
  <link rel="manifest" href="/assets/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>JOON · Command</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #172033; --steel: #3c4658; --muted: #667085; --line: #e4e8ef;
      --soft: #f5f7fa; --paper: #ffffff; --charcoal: #101828; --blue: #2563eb;
      --green: #0f766e; --amber: #b45309; --red: #b42318; --plum: #7c3aed;
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.06);
      --sidebar: 220px;
    }
    html { scroll-behavior: smooth; }
    body {
      min-width: 320px; color: var(--ink); background: #eef2f6;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 0.875rem; line-height: 1.5;
    }
    a { color: inherit; }
    h1 { font-size: 1.25rem; font-weight: 900; }

    /* ---------- Sidebar ---------- */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar); z-index: 30;
      background: var(--charcoal); color: rgba(255,255,255,0.72);
      display: flex; flex-direction: column; padding: 0.9rem 0.7rem;
      overflow-y: auto;
    }
    .brand {
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
      padding: 0.15rem 0.55rem 0.85rem;
    }
    .brand b { color: #fff; font-size: 0.95rem; font-weight: 900; letter-spacing: 0.01em; white-space: nowrap; }
    .brand b span { color: var(--blue); }
    #navToggle {
      display: none; background: none; border: 0; color: #fff; cursor: pointer;
      font-size: 1.3rem; line-height: 1; padding: 0.25rem 0.45rem; border-radius: 6px;
    }
    #navToggle:hover { background: rgba(255,255,255,0.12); }
    .nav { display: grid; gap: 0.2rem; }
    .nav a {
      display: block; text-decoration: none; border-radius: 8px;
      padding: 0.58rem 0.7rem; font-weight: 800; font-size: 0.84rem;
      color: rgba(255,255,255,0.72); border-left: 3px solid transparent;
    }
    .nav a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .nav a.active { color: #fff; background: rgba(37,99,235,0.22); border-left-color: var(--blue); }
    .navgroup {
      margin: 1.1rem 0 0.35rem; padding: 0 0.6rem;
      font-size: 0.66rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em;
      color: rgba(255,255,255,0.42);
    }
    .nav.tools a { font-size: 0.78rem; font-weight: 700; padding: 0.38rem 0.7rem; color: rgba(255,255,255,0.6); }
    .nav.tools a:hover { color: #fff; }
    .sidefoot { margin-top: auto; padding-top: 1rem; display: grid; gap: 0.5rem; }
    .sidefoot a {
      display: block; text-decoration: none; border-radius: 8px;
      padding: 0.42rem 0.6rem; font-size: 0.78rem; font-weight: 800;
      color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.14);
      text-align: center;
    }
    .sidefoot a:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
    .sidefoot .version {
      text-align: center; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.3); padding: 0.1rem 0.6rem;
    }

    /* ---------- Content ---------- */
    .main { margin-left: var(--sidebar); min-height: 100vh; }
    #view { width: min(1560px, 100%); margin: 0 auto; padding: 1.3rem 1.5vw 3rem; display: grid; gap: 1.1rem; align-content: start; }
    .viewhead { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; flex-wrap: wrap; padding: 0.2rem 0.1rem 0; }
    .muted { color: var(--muted); }
    .nowrap { white-space: nowrap; }

    /* ---------- Cards ---------- */
    .card { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 1.1rem; box-shadow: var(--shadow); }
    .card h2 {
      font-size: 0.74rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); margin-bottom: 0.65rem;
    }

    /* ---------- KPI tiles ---------- */
    .kpis { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 0.7rem; }
    .kpi { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 0.75rem 0.9rem; box-shadow: var(--shadow); }
    .kpi b { display: block; font-size: 1.5rem; font-weight: 900; line-height: 1.3; }
    .kpi span {
      color: var(--muted); font-size: 0.66rem; font-weight: 700; font-variant: small-caps;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .kpi[data-accent="green"] b { color: var(--green); }
    .kpi[data-accent="amber"] b { color: var(--amber); }
    .kpi[data-accent="red"] b { color: var(--red); }

    /* ---------- Table ---------- */
    .table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .table th {
      position: sticky; top: 0; z-index: 1; background: var(--soft); text-align: left;
      padding: 0.55rem 0.6rem; font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--line);
      white-space: nowrap; user-select: none;
    }
    .table td { padding: 0.6rem 0.6rem; border-bottom: 1px solid #eef1f6; vertical-align: top; }
    .table tbody tr:hover { background: #f7f9fc; }
    .table tr[data-href] { cursor: pointer; }
    .tablewrap { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; overflow: auto; max-height: 74vh; box-shadow: var(--shadow); }

    /* ---------- Pills & score chips ---------- */
    .pill {
      display: inline-block; border-radius: 999px; padding: 0.05rem 0.5rem;
      font-size: 0.7rem; font-weight: 800; background: var(--soft); color: var(--steel);
      border: 1px solid var(--line); white-space: nowrap;
    }
    .pill.green { background: #e7f6f4; color: var(--green); border-color: #bfe6e1; }
    .pill.amber { background: #fdf3e7; color: var(--amber); border-color: #f3ddc0; }
    .pill.red { background: #fdecea; color: var(--red); border-color: #f5c9c4; }
    .pill.plum { background: #f3ecfe; color: var(--plum); border-color: #ded0f7; }
    .score {
      display: inline-block; min-width: 34px; text-align: center; border-radius: 6px;
      padding: 0.1rem 0.3rem; font-weight: 900; color: #fff; font-size: 0.78rem;
    }
    .s-hi { background: var(--green); } .s-mid { background: var(--amber); }
    .s-lo { background: var(--red); } .s-na { background: var(--muted); }

    /* ---------- Tabs ---------- */
    .tabs { display: flex; gap: 0.15rem; border-bottom: 2px solid var(--line); overflow-x: auto; }
    .tab {
      appearance: none; background: none; border: 0; cursor: pointer; font: inherit;
      padding: 0.5rem 0.85rem; font-size: 0.82rem; font-weight: 800; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap;
    }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ---------- Buttons ---------- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
      height: 34px; border: 1px solid var(--line); border-radius: 8px;
      padding: 0 0.85rem; background: var(--paper); font: inherit; font-size: 0.82rem;
      font-weight: 800; cursor: pointer; color: var(--steel); text-decoration: none;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .btn:hover { color: var(--blue); background: var(--soft); }
    .btn.primary {
      background: var(--blue); border-color: var(--blue); color: #fff;
      box-shadow: 0 4px 12px rgba(37,99,235,0.28);
    }
    .btn.primary:hover { background: #1e4fc4; color: #fff; }

    /* ---------- Filter chips ---------- */
    .chips { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
    .chip {
      appearance: none; font: inherit; cursor: pointer; border-radius: 999px;
      border: 1px solid var(--line); background: var(--paper); color: var(--steel);
      padding: 0.18rem 0.7rem; font-size: 0.76rem; font-weight: 800;
    }
    .chip:hover { border-color: var(--blue); color: var(--blue); }
    .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ---------- Drawer ---------- */
    #overlay { position: fixed; inset: 0; background: rgba(16,24,40,0.4); display: none; z-index: 40; }
    #overlay.show { display: block; }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: min(680px, 96vw);
      background: var(--paper); z-index: 50; transform: translateX(105%);
      transition: transform 0.18s ease; overflow-y: auto;
      box-shadow: -18px 0 40px rgba(16,24,40,0.18);
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      position: sticky; top: 0; background: var(--paper); border-bottom: 1px solid var(--line);
      padding: 0.9rem 1.1rem; display: flex; justify-content: space-between;
      align-items: flex-start; gap: 1rem; z-index: 2;
    }
    .drawer-body { padding: 1rem 1.1rem 2rem; display: grid; gap: 0.9rem; }

    /* ---------- Empty / loading states ---------- */
    .empty {
      background: var(--paper); border: 1px dashed var(--line); border-radius: 12px;
      padding: 1.6rem 1rem; text-align: center; color: var(--muted); font-size: 0.84rem;
    }
    .empty b { display: block; color: var(--steel); font-size: 0.92rem; margin-bottom: 0.2rem; }
    .allclear { display: flex; align-items: center; gap: 0.4rem; color: var(--green); font-size: 0.8rem; font-weight: 700; padding: 0.3rem 0.1rem; }
    .allclear::before { content: "✓"; font-weight: 900; }
    .loading { color: var(--muted); font-size: 0.84rem; padding: 1.2rem 0.3rem; }
    .loading::after { content: "…"; }

    /* ---------- Dashboard specifics ---------- */
    .itemlist { display: grid; gap: 0.15rem; }
    .item {
      display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
      text-decoration: none; border-radius: 8px; padding: 0.5rem 0.55rem; font-size: 0.84rem;
      font-weight: 700; color: var(--steel);
    }
    .item:hover { background: var(--soft); }
    .item .who { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item .who small { color: var(--muted); font-weight: 400; }
    .item .meta { display: flex; align-items: center; gap: 0.35rem; flex-shrink: 0; }
    .quick { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .footline { color: var(--muted); font-size: 0.78rem; padding: 0.15rem 0.2rem; }
    .sweepline {
      display: flex; align-items: center; gap: 0.45rem; font-size: 0.82rem; color: var(--steel);
      border-top: 1px solid #eef1f6; margin-top: 0.5rem; padding-top: 0.65rem;
    }
    .dot { width: 7px; height: 7px; border-radius: 999px; flex-shrink: 0; background: var(--muted); }
    .dot.on { background: var(--green); }

    /* ---------- Toast ---------- */
    #toasts { position: fixed; bottom: 1.1rem; left: 50%; transform: translateX(-50%); z-index: 70; display: grid; gap: 0.4rem; justify-items: center; }
    .toast {
      background: var(--charcoal); color: #fff; border-radius: 8px; padding: 0.5rem 0.95rem;
      font-size: 0.82rem; font-weight: 700; box-shadow: var(--shadow);
      animation: toastin 0.15s ease;
    }
    @keyframes toastin { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ---------- Mobile ---------- */
    @media (max-width: 940px) {
      .sidebar {
        position: sticky; top: 0; bottom: auto; width: 100%; overflow: visible;
        padding: 0.55rem 0.8rem;
      }
      .brand { padding-bottom: 0; }
      #navToggle { display: block; }
      .sidebar .nav, .sidebar .navgroup, .sidebar .sidefoot { display: none; }
      .sidebar.open .nav { display: grid; }
      .sidebar.open .navgroup { display: block; }
      .sidebar.open .sidefoot { display: block; padding-bottom: 0.5rem; }
      .main { margin-left: 0; }
      .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <b>JOON <span>·</span> Command</b>
      <button id="navToggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
    </div>
    <nav class="nav" id="mainNav">
      <a href="#/dashboard" data-view="dashboard">Dashboard</a>
      <a href="#/projects" data-view="projects">Projects</a>
      <a href="#/subs" data-view="subs">Subs</a>
      <a href="#/suppliers" data-view="suppliers">Suppliers</a>
      <a href="#/pipeline" data-view="pipeline">Leads</a>
      <a href="#/permits" data-view="permits">Permits</a>
      <a href="#/pricing" data-view="pricing">Pricing</a>
      <a href="#/knowledge" data-view="knowledge">Knowledge</a>
      <a href="#/design" data-view="design">🎨 Design</a>
      <a href="#/bids" data-view="bids">📄 Bids</a>
      <a href="#/curriculum" data-view="curriculum">📚 Curriculum</a>
      <a href="#/photos" data-view="photos">📷 Photos</a>
    </nav>
    <div class="sidefoot">
      <a href="/index.html">Public site</a>
      <div class="version">JOON Command</div>
    </div>
  </aside>

  <div class="main">
    <main id="view" aria-live="polite"></main>
  </div>

  <div id="overlay"></div>
  <aside class="drawer" id="drawer" aria-hidden="true"></aside>
  <div id="toasts"></div>

  <script>
    (function () {
      "use strict";

      var views = {};
      var booted = false;           // true once DOMContentLoaded has fired (all modules loaded)
      var renderedName = null;      // view actually rendered last
      var requestedName = null;     // view the hash asked for

      /* ---------- helpers ---------- */

      function esc(value) {
        return String(value === null || value === undefined ? "" : value)
          .replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
          });
      }

      function el(html) {
        var tpl = document.createElement("template");
        tpl.innerHTML = String(html).trim();
        return tpl.content.firstElementChild;
      }

      function fetchJSON(url, options) {
        return fetch(url, options).then(function (res) {
          return res.text().then(function (text) {
            var data = null;
            try { data = text ? JSON.parse(text) : null; } catch (_e) { /* non-JSON body */ }
            if (!res.ok) {
              var msg = (data && (data.error || data.message)) || (res.status + " " + res.statusText);
              var err = new Error(msg);
              err.status = res.status;
              throw err;
            }
            return data;
          });
        });
      }

      function fmtMoney(number) {
        var n = Number(number);
        if (!isFinite(n)) return "—";
        var abs = Math.abs(n);
        var opts = abs >= 1000 || Number.isInteger(n)
          ? { maximumFractionDigits: 0 }
          : { minimumFractionDigits: 2, maximumFractionDigits: 2 };
        return (n < 0 ? "-$" : "$") + abs.toLocaleString("en-US", opts);
      }

      function fmtDate(iso) {
        if (!iso) return "—";
        var d = new Date(iso);
        if (isNaN(d.getTime())) return "—";
        return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
      }

      function fmtAgo(iso) {
        if (!iso) return "—";
        var d = new Date(iso);
        if (isNaN(d.getTime())) return "—";
        var diff = Date.now() - d.getTime();
        var future = diff < 0;
        var s = Math.abs(diff) / 1000;
        var label;
        if (s < 60) label = "just now";
        else if (s < 3600) label = Math.floor(s / 60) + "m";
        else if (s < 86400) label = Math.floor(s / 3600) + "h";
        else if (s < 86400 * 30) label = Math.floor(s / 86400) + "d";
        else if (s < 86400 * 365) label = Math.floor(s / (86400 * 30)) + "mo";
        else label = Math.floor(s / (86400 * 365)) + "y";
        if (label === "just now") return label;
        return future ? "in " + label : label + " ago";
      }

      function scoreBadge(score) {
        var n = Number(score);
        var cls = "s-na", text = "—";
        if (isFinite(n) && n > 0) {
          text = String(Math.round(n));
          cls = n >= 80 ? "s-hi" : n >= 60 ? "s-mid" : "s-lo";
        }
        return '<span class="score ' + cls + '">' + text + "</span>";
      }

      function tierPill(tier) {
        var t = String(tier || "").toLowerCase();
        var cls = { verified: "green", credible: "plum", unverified: "amber", risky: "red", flagged: "red" }[t] || "";
        return '<span class="pill ' + cls + '">' + esc(t || "unscored") + "</span>";
      }

      function toast(message) {
        var box = document.getElementById("toasts");
        var node = el('<div class="toast">' + esc(message) + "</div>");
        box.appendChild(node);
        setTimeout(function () {
          node.style.opacity = "0";
          node.style.transition = "opacity 0.25s";
          setTimeout(function () { node.remove(); }, 260);
        }, 3200);
      }

      /* ---------- drawer ---------- */

      var drawer = document.getElementById("drawer");
      var overlay = document.getElementById("overlay");

      function openDrawer(content) {
        drawer.innerHTML = "";
        if (content) {
          if (typeof content === "string") drawer.innerHTML = content;
          else drawer.appendChild(content);
        }
        drawer.classList.add("open");
        drawer.setAttribute("aria-hidden", "false");
        overlay.classList.add("show");
      }

      function closeDrawer() {
        drawer.classList.remove("open");
        drawer.setAttribute("aria-hidden", "true");
        overlay.classList.remove("show");
      }

      overlay.addEventListener("click", closeDrawer);
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeDrawer();
      });

      /* ---------- router ---------- */

      function registerView(name, def) {
        views[name] = def || {};
        // A module registered after first navigation: if its route was requested
        // but we fell back, re-dispatch now.
        if (requestedName === name && renderedName !== name) route();
      }

      function navigate(hash) {
        if (location.hash === hash) route();
        else location.hash = hash;
      }

      function parseHash() {
        var raw = (location.hash || "").replace(/^#\/?/, "");
        var parts = raw.split("/").filter(Boolean);
        var name = parts[0] || "dashboard";
        var params = {};
        if (parts[1]) params.id = decodeURIComponent(parts[1]);
        return { name: name, params: params };
      }

      function setActiveNav(name) {
        var links = document.querySelectorAll("#mainNav a[data-view]");
        for (var i = 0; i < links.length; i++) {
          links[i].classList.toggle("active", links[i].getAttribute("data-view") === name);
        }
      }

      function route() {
        var parsed = parseHash();
        requestedName = parsed.name;
        var def = views[parsed.name];
        var name = parsed.name;

        if (!def) {
          // Unknown or not-yet-registered view -> dashboard fallback.
          if (booted && parsed.name !== "dashboard") {
            toast("View “" + parsed.name + "” isn’t available — showing dashboard");
          }
          name = "dashboard";
          def = views.dashboard;
        }
        if (!def) return; // dashboard itself not registered yet (never happens after this script)

        closeDrawer();
        setActiveNav(name);
        document.title = (def.title ? def.title + " · " : "") + "JOON · Command";
        // Each render gets its own wrapper node. When navigation replaces it,
        // a previous view's late async writes land in a detached element
        // instead of polluting the current view (cold deep-link race).
        var host = document.getElementById("view");
        host.innerHTML = "";
        var container = document.createElement("div");
        container.style.display = "contents";
        host.appendChild(container);
        renderedName = name;
        try {
          def.render(container, parsed.params);
        } catch (err) {
          container.innerHTML = "";
          container.appendChild(el(
            '<div class="empty"><b>Something went wrong</b>' + esc(err && err.message || String(err)) + "</div>"
          ));
        }
        // collapse mobile nav after navigation
        document.getElementById("sidebar").classList.remove("open");
      }

      window.addEventListener("hashchange", route);

      // Rows (or any element) with data-href are clickable — shell-provided behavior.
      document.addEventListener("click", function (e) {
        if (e.target.closest("a, button, input, select, textarea, label")) return;
        var target = e.target.closest("[data-href]");
        if (!target) return;
        var href = target.getAttribute("data-href");
        if (!href) return;
        if (href.charAt(0) === "#") navigate(href);
        else location.href = href;
      });

      /* ---------- mobile nav ---------- */

      document.getElementById("navToggle").addEventListener("click", function () {
        var sb = document.getElementById("sidebar");
        var open = sb.classList.toggle("open");
        this.setAttribute("aria-expanded", open ? "true" : "false");
      });

      /* ---------- expose APP ---------- */

      window.APP = {
        registerView: registerView,
        navigate: navigate,
        fetchJSON: fetchJSON,
        el: el,
        esc: esc,
        fmtMoney: fmtMoney,
        fmtDate: fmtDate,
        fmtAgo: fmtAgo,
        scoreBadge: scoreBadge,
        tierPill: tierPill,
        toast: toast,
        openDrawer: openDrawer,
        closeDrawer: closeDrawer
      };

      /* ================= Dashboard view ================= */

      registerView("dashboard", {
        title: "Dashboard",
        render: function (container) {
          container.appendChild(el(
            '<div class="viewhead"><h1>Dashboard</h1>' +
            '<div class="quick">' +
              '<a class="btn primary" href="#/projects">+ New project</a>' +
              '<a class="btn" href="change_orders.html">+ New CO</a>' +
            "</div></div>"
          ));
          var body = el('<div class="loading">Loading dashboard</div>');
          container.appendChild(body);

          fetchJSON("/api/dashboard").then(function (data) {
            body.remove();
            renderDashboard(container, data || {});
          }).catch(function (err) {
            body.remove();
            container.appendChild(el(
              '<div class="empty"><b>Couldn’t load the dashboard</b>' + esc(err.message) +
              '<div style="margin-top:0.7rem"><button class="btn primary" onclick="APP.navigate(\'#/dashboard\')">Retry</button></div></div>'
            ));
          });
        }
      });

      // One compact count-line for the "Needs attention" card — no company names on the dashboard.
      function countLine(count, text, href, tone) {
        var n = Number(count) || 0;
        if (!n) return "";
        return '<a class="item" href="' + esc(href) + '">' +
          '<span class="who">' + n + " " + esc(text) + "</span>" +
          '<span class="meta"><span class="pill' + (tone ? " " + tone : "") + '">view</span></span></a>';
      }

      function sweepLineHtml(v) {
        if (v && v.enabled) {
          var per = Number(v.perNight || 0);
          var nights = v.nightsToClear;
          var tail = nights ? ", ~" + nights + " night" + (nights === 1 ? "" : "s") + " to finish the roster" : "";
          return '<span class="dot on"></span><span>Nightly vetting: <b>ON</b> — ' + per + "/night" + esc(tail) + "</span>";
        }
        return '<span class="dot"></span><span>Nightly vetting: <b>OFF</b> — turn it on from the Audit tool to clear the backlog faster</span>';
      }

      function renderDashboard(container, data) {
        var k = data.kpis || {};
        var a = data.actionItems || {};

        /* KPI row */
        container.appendChild(el(
          '<div class="kpis">' +
            kpi(k.subs, "Subs") +
            kpi(k.strongContacts, "Strong contacts") +
            kpi(k.verified, "Verified", "green") +
            kpi(k.projects, "Projects") +
            kpi(k.openBids, "Open bids") +
            kpi(k.newLeads, "New leads", Number(k.newLeads) > 0 ? "amber" : "") +
            kpi(fmtMoney(k.pipelineValue || 0), "Pipeline $", "green") +
          "</div>"
        ));

        /* Next steps — pinned action-plan checklist (JOON_ACTION_PLAN.md § 0).
           Loads independently and hides itself on error so a missing plan
           file / down API never breaks the rest of the dashboard. */
        var planCardEl = el('<div class="card"><h2>📋 Next steps</h2><div class="loading">Loading…</div></div>');
        container.appendChild(planCardEl);
        fetchJSON("/api/plan").then(function (plan) {
          var steps = (plan && plan.steps) || [];
          var doneCount = steps.filter(function (s) { return s.done; }).length;
          var unchecked = steps.filter(function (s) { return !s.done; }).slice(0, 4);
          var rows = unchecked.map(function (s) {
            var m = String(s.text || "").match(/^\*\*([^*]+)\*\*\s*[—-]?\s*(.*)$/);
            var owner = m ? m[1] : "";
            var rest = (m ? m[2] : s.text || "").replace(/\s*\(§[^)]*\)\s*$/, "");
            var short = rest.length > 90 ? rest.slice(0, 90).replace(/\s+\S*$/, "") + "…" : rest;
            return '<div style="display:flex;gap:0.5rem;align-items:flex-start;padding:0.28rem 0">' +
              (owner ? '<span class="pill" style="flex:0 0 auto">' + esc(owner) + "</span>" : "") +
              '<span style="font-size:0.85rem">' + esc(short) + "</span>" +
            "</div>";
          }).join("");
          planCardEl.innerHTML =
            '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem">' +
              "<h2>📋 Next steps</h2>" +
              '<span class="muted" style="font-size:0.8rem">' + doneCount + " of " + steps.length + " done</span>" +
            "</div>" +
            (rows || '<div class="allclear">All caught up — nothing outstanding</div>') +
            '<div style="margin-top:0.5rem"><a href="#/plan" style="font-weight:700;text-decoration:none">Open the plan →</a></div>';
        }).catch(function () { planCardEl.remove(); });

        /* Needs attention — one compact card, count-lines only, no name lists */
        var lines = [
          countLine((a.expiringDocs || []).length, "docs/licenses expiring or overdue", "#/subs", "amber"),
          countLine((a.pendingCOs || []).length, "COs awaiting client approval", "#/projects", ""),
          countLine((a.openRfqs || []).length, "RFQs awaiting sub responses", "#/pipeline", "plum"),
          countLine((a.newLeads || []).length, "new leads waiting", "#/pipeline", "amber"),
          countLine((a.flaggedSubs || []).length, "red-flagged subs in pipeline", "#/subs", "red")
        ].filter(Boolean);

        var attnInner = lines.length
          ? '<div class="itemlist">' + lines.join("") + "</div>"
          : '<div class="allclear">All clear — nothing needs attention</div>';

        var attnCardEl = el(
          '<div class="card"><h2>Needs attention</h2>' + attnInner +
          '<div class="sweepline"><span class="dot"></span><span class="muted">Checking nightly vetting…</span></div></div>'
        );
        container.appendChild(attnCardEl);

        fetchJSON("/api/vetsweep").then(function (v) {
          var line = attnCardEl.querySelector(".sweepline");
          if (line) line.innerHTML = sweepLineHtml(v);
        }).catch(function () {
          var line = attnCardEl.querySelector(".sweepline");
          if (line) line.remove();
        });

        /* AI usage (30d) — compact card over the token-spend tracker */
        var aiCardEl = el('<div class="card"><h2>AI usage (30d)</h2><div class="loading">Loading…</div></div>');
        container.appendChild(aiCardEl);
        fetchJSON("/api/token-usage?days=30").then(function (u) {
          var t = (u && u.totals) || {};
          var top = (u && u.byFeature && u.byFeature[0]) || null;
          var totalTokens = (Number(t.inputTokens) || 0) + (Number(t.outputTokens) || 0);
          aiCardEl.innerHTML = '<h2>AI usage (30d)</h2>' +
            '<div class="kpis" style="grid-template-columns:repeat(4,minmax(0,1fr))">' +
              kpi(Number(t.calls) || 0, "Calls") +
              kpi(totalTokens.toLocaleString(), "Tokens") +
              kpi("$" + (Number(t.costUsd) || 0).toFixed(2), "Est. cost", "green") +
              kpi(top ? top.feature : "—", "Top feature") +
            "</div>";
        }).catch(function () { aiCardEl.remove(); });

        /* Jobs timeline — portfolio Gantt of active jobs */
        var ganttSlot = el("<div></div>");
        container.appendChild(ganttSlot);
        fetchJSON("/api/actuals").then(function (projects) {
          if (window.GANTT) GANTT.renderPortfolio(ganttSlot, projects || []);
        }).catch(function () { ganttSlot.remove(); });

        /* Vetting summary + recent estimates foot lines (muted, single line each) */
        container.appendChild(el(
          '<div class="footline">Vetting: <b>' + Number(k.verified || 0) + "</b> verified · <b>" +
          Number(k.deepVetted || 0) + "</b> deep-vetted · <b>" + Number(k.redFlagged || 0) +
          '</b> red-flagged — <a href="#/subs">view in Subs</a></div>'
        ));

        var estimates = data.estimates || [];
        if (estimates.length) {
          container.appendChild(el(
            '<div class="footline">Recent estimates: ' + estimates.map(function (est) {
              return '<a href="estimator.html">' + esc(est.projectName || "Estimate") + "</a> (" +
                esc(fmtMoney(est.total)) + (est.status ? " · " + esc(est.status) : "") + ")";
            }).join(" &nbsp;·&nbsp; ") + "</div>"
          ));
        }
      }

      function kpi(value, label, accent) {
        return '<div class="kpi"' + (accent ? ' data-accent="' + accent + '"' : "") + "><b>" +
          esc(value === null || value === undefined ? "—" : value) + "</b><span>" + esc(label) + "</span></div>";
      }

      /* ---------- boot ---------- */

      // First paint immediately (dashboard is registered above).
      route();

      // Modules load after this script; once everything has run, re-dispatch if the
      // requested view couldn't be resolved on first paint (e.g. deep link to #/subs/:id).
      document.addEventListener("DOMContentLoaded", function () {
        booted = true;
        if (requestedName !== renderedName) route();
      });
    })();
  </script>
  <script src="app_subs.js"></script>
  <script src="app_projects.js"></script>
  <script src="app_pipeline.js"></script>
  <script src="app_knowledge.js"></script>
  <script src="app_suppliers.js"></script>
  <script src="app_gantt.js"></script>
  <script src="app_takeoff.js"></script>
  <script src="app_billing.js"></script>
  <script src="app_permits.js"></script>
  <script src="app_design3d.js"></script>
  <script src="app_learn.js"></script>
  <script src="app_bids.js"></script>
  <script src="app_plan.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
    }
  </script>
</body>
